# release-please — automated SemVer release engineering.
#
# Flow:
#   1. Every push to `main` runs release-please-action.
#   2. The action reads conventional-commit subjects since the last release and maintains
#      a single self-updating PR titled "release: vX.Y.Z" which bumps root package.json
#      and appends entries to CHANGELOG.md.
#   3. When that PR is merged, release-please creates the git tag (vX.Y.Z) AND a GitHub
#      Release whose body is the changelog excerpt.
#   4. The second job in this workflow (`dispatch-image-publish`) then fires
#      .github/workflows/publish-image.yml via workflow_dispatch against the new tag.
#      We chain via workflow_dispatch (rather than the natural `push: tags: v*` trigger
#      on publish-image) because tags pushed by GITHUB_TOKEN do NOT trigger downstream
#      workflows — workflow_dispatch and repository_dispatch are the two documented
#      exceptions to that rule. This keeps the whole chain on the default GITHUB_TOKEN —
#      no PAT and no GitHub App required.
#
# NOTE: when folding curated release notes (packages/core/src/releases.ts) into an OPEN release PR,
# commit them as `docs(...)`, NEVER `chore(...)`. `chore` is hidden:true in release-please-config.json,
# so a chore-only delta yields an identical changelog and release-please leaves the open PR stale (it
# only re-pushes the PR branch when its generated CHANGELOG/package.json/manifest would change). `docs`
# adds a Documentation line, forcing a rebase of the PR onto the new main so the notes show up in it.
# Neither type changes the computed bump; the notes ship either way (the tag is cut from main HEAD),
# but `docs` keeps the PR an accurate preview.
#
# No secrets required — uses the built-in GITHUB_TOKEN with elevated permissions below.
# Manual override: workflow_dispatch re-runs the action without waiting for a push.

name: release-please

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write

jobs:
    release-please:
        runs-on: ubuntu-latest
        outputs:
            release_created: ${{ steps.release.outputs.release_created }}
            tag_name: ${{ steps.release.outputs.tag_name }}
        steps:
            - name: Run release-please
              id: release
              uses: googleapis/release-please-action@v5
              with:
                  config-file: release-please-config.json
                  manifest-file: .release-please-manifest.json
                  token: ${{ secrets.GITHUB_TOKEN }}

    dispatch-image-publish:
        needs: release-please
        if: needs.release-please.outputs.release_created == 'true'
        runs-on: ubuntu-latest
        permissions:
            actions: write
        steps:
            - name: Dispatch publish-image for the new tag
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh workflow run publish-image.yml \
                      --repo ${{ github.repository }} \
                      --ref ${{ needs.release-please.outputs.tag_name }} \
                      -f push=true
