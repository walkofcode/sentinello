# Build and publish the official Sentinello container image.
#
# Triggers:
#   - Push of a `v*` tag (e.g. `v0.1.0`) → builds linux/amd64 + linux/arm64 and pushes to
#     both ghcr.io/walkofcode/sentinello and walkofcode/sentinello with tags:
#       latest, vX.Y.Z, vX.Y, sha-<short>
#   - workflow_dispatch → manual run. Defaults to build-only (no push) for dry-run smoke tests;
#     flip the `push` input to true to actually push (useful for re-publishing `latest` off main).
#
# Secrets required (Settings → Secrets and variables → Actions):
#   - DOCKERHUB_USERNAME — `walkofcode` (or a bot account with push to that org)
#   - DOCKERHUB_TOKEN    — Docker Hub access token, Read/Write/Delete scoped to walkofcode/sentinello
# GHCR uses the built-in GITHUB_TOKEN — no extra secret needed beyond enabling Packages.

name: docker-publish

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:
        inputs:
            push:
                description: 'Push built image to registries (false = build only)'
                type: boolean
                default: false

permissions:
    contents: read
    packages: write

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up QEMU (for linux/arm64 cross-build)
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              if: ${{ github.event_name == 'push' || inputs.push }}
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Log in to Docker Hub
              if: ${{ github.event_name == 'push' || inputs.push }}
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Extract image metadata (tags + OCI labels)
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: |
                      ghcr.io/walkofcode/sentinello
                      walkofcode/sentinello
                  tags: |
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=ref,event=branch
                      type=sha,prefix=sha-,format=short
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./Dockerfile
                  platforms: linux/amd64,linux/arm64
                  push: ${{ github.event_name == 'push' || inputs.push }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: |
                      SENTINELLO_VERSION=${{ steps.meta.outputs.version }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  provenance: true
                  sbom: true
